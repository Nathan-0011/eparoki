<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="400" height="150">
    <!-- Background (transparan atau bisa diisi) -->
    <rect width="100%" height="100%" fill="transparent" />

    <!-- Icon Cross/Salib -->
    <g transform="translate(10, 25)">
        <circle cx="50" cy="50" r="45" fill="#7c3aed" />
        <!-- Garis vertikal -->
        <rect x="45" y="25" width="10" height="50" fill="white" rx="3" />
        <!-- Garis horizontal -->
        <rect x="30" y="40" width="40" height="10" fill="white" rx="3" />
    </g>

    <!-- Teks "SF" (Santo Fidelis) -->
    <text x="130" y="70" font-family="'Inter', 'Segoe UI', sans-serif" font-size="42" font-weight="900" fill="#7c3aed" letter-spacing="-1">
        eKatolik
    </text>

    <!-- Teks Paroki Parapat -->
    <text x="135" y="100" font-family="'Inter', 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#6b7280" letter-spacing="0.5">
        Santo Fidelis Parapat
    </text>
</svg>
